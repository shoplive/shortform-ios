name: Notify iOS release merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  dispatch:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Create dispatch token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_AUTOMATION_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_AUTOMATION_APP_PRIVATE_KEY }}
          owner: shoplive
          repositories: matrix-sdk-ios
          permission-contents: write

      - name: Notify matrix release coordinator
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          SOURCE_REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          version="${HEAD_REF#release/}"
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]
          jq -n --arg version "$version" --arg repo "$SOURCE_REPO" \
            --argjson pr "$PR_NUMBER" --arg sha "$HEAD_SHA" \
            '{event_type:"ios-release-progress",client_payload:{version:$version,source_repo:$repo,pr_number:$pr,head_sha:$sha}}' \
            | gh api --method POST repos/shoplive/matrix-sdk-ios/dispatches --input -
